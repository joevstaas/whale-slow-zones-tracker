name: Poll NOAA Dynamic Management Areas

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll NOAA API
        run: python poll_dma.py

      - name: Export ODP-compatible GeoJSON
        run: python poll_dma.py --export-geojson

      - name: Export CSV
        run: python poll_dma.py --export-csv

      - name: Print history
        run: python poll_dma.py --history

      - name: Ingest to ODP
        env:
          ODP_API_KEY: ${{ secrets.ODP_API_KEY }}
        run: python odp_ingest.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "poll: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
